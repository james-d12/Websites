services:
  sites:
    build:
      context: .
      dockerfile: Site.Dockerfile
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "35421:35421"
      - "35422:35422"
      - "35423:35423"
      - "35424:35424"
      - "35425:35425"
    command: [ "pnpm", "--filter", "./sites/*", "dev", "--host" ]
    healthcheck:
      test: >
        sh -c "curl -f http://localhost:35421 &&
               curl -f http://localhost:35422 &&
               curl -f http://localhost:35423 &&
               curl -f http://localhost:35424 &&
               curl -f http://localhost:35425"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  playwright:
    build:
      context: .
      dockerfile: Playwright.Dockerfile
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DOCKER=true
      - JAMESDURBAN_BASE_URL=http://sites:35421
      - BLACKCATTATTOOS_BASE_URL=http://sites:35422
      - ORCHITECT_BASE_URL=http://sites:35423
      - STCATHERINESGROUP_BASE_URL=http://sites:35424
      - THECONTOURCLINICRICHMOND_BASE_URL=http://sites:35425
    depends_on:
      - sites
    command: [ "pnpm", "exec", "playwright", "test" ]