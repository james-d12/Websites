name: Run Playwright e2e tests
description: Run a single site's Playwright spec folder against a given base URL

inputs:
  site:
    required: true
    description: Site domain, matching a folder under web/e2e-tests/ (e.g. jamesdurban.com)
  base-url:
    required: true
    description: URL to run the tests against (e.g. https://staging.jamesdurban.com)
  report-name:
    required: true
    description: Name for the uploaded Playwright HTML report artifact

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: 24

    - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      name: Install pnpm
      id: pnpm-install
      with:
        version: 10
        run_install: false

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7   # v5
      name: Setup pnpm cache
      with:
        path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      working-directory: web
      shell: bash
      run: pnpm install

    - name: Install Playwright Browsers
      working-directory: web
      shell: bash
      run: pnpm exec playwright install --with-deps chromium

    - name: Run Playwright tests
      working-directory: web
      shell: bash
      run: pnpm exec playwright test "e2e-tests/${{ inputs.site }}/" --reporter=list,html
      env:
        BASE_URL: ${{ inputs.base-url }}
        PLAYWRIGHT_SKIP_WEBSERVER: "1"

    - name: Upload Playwright report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: ${{ inputs.report-name }}
        path: web/playwright-report/
        retention-days: 7
