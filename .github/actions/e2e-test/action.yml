name: Run Playwright e2e tests
description: Run a single site's Playwright spec folder against a given base URL
# Caller must run actions/checkout before this step — local actions must already
# be present on disk to be resolved, so this action can't check itself out.

inputs:
  site:
    required: true
    description: Site domain, matching a folder under web/e2e-tests/ (e.g. jamesdurban.com)
  base-url:
    required: true
    description: URL to run the tests against (e.g. https://staging.jamesdurban.com)
  report-name:
    required: true
    description: Name for the uploaded Playwright HTML report artifact

runs:
  using: composite
  steps:
    - name: Install Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
      with:
        node-version: 24

    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      name: Install pnpm
      id: pnpm-install
      with:
        version: 11
        run_install: false

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9   # v6
      name: Setup pnpm cache
      with:
        path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      working-directory: web
      shell: bash
      run: pnpm install

    - name: Get installed Playwright version
      id: playwright-version
      working-directory: web
      shell: bash
      run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9   # v6
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright Chromium
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      working-directory: web
      shell: bash
      run: pnpm exec playwright install --with-deps chromium

    - name: Install Playwright OS dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      working-directory: web
      shell: bash
      run: pnpm exec playwright install-deps chromium

    - name: Run Playwright tests
      working-directory: web
      shell: bash
      run: pnpm exec playwright test "e2e-tests/${{ inputs.site }}/" --reporter=list,html
      env:
        BASE_URL: ${{ inputs.base-url }}
        PLAYWRIGHT_SKIP_WEBSERVER: "1"

    - name: Upload Playwright report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: ${{ inputs.report-name }}
        path: web/playwright-report/
        retention-days: 7
