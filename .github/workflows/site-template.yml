permissions:
  contents: read

on:
  workflow_call:
    inputs:
      site:
        required: true
        type: string
      cms_deployment:
        required: false
        type: boolean
        default: false
      enable_cms:
        required: false
        type: boolean
        default: false
    secrets:
      server_host:
        required: true
      server_ssh_port:
        required: true
      server_key:
        required: true
      directus_url:
        required: false
      directus_build_secret:
        required: false
        
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ${{ inputs.site }}
    env:
      site_full_path: web/sites/${{ inputs.site }}
      DIRECTUS_URL: ${{ secrets.directus_url }}
      DIRECTUS_BUILD_SECRET: ${{ secrets.directus_build_secret }}
      PUBLIC_ENABLE_CMS: ${{ inputs.enable_cms }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: web
        run: pnpm install

      - name: Check code formatting
        working-directory: web
        run: pnpm run format:check

      - name: Build Libs
        working-directory: web
        run: pnpm run build:libs

      - name: Build project
        working-directory: web
        run: pnpm --filter "${{ inputs.site }}" run build

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: site-dist-${{ inputs.site }}
          path: ${{ env.site_full_path }}/dist
          if-no-files-found: error
          retention-days: 30

  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy ${{ inputs.site }} To Staging
    needs: build
    environment: ${{ inputs.cms_deployment && 'Staging_CMS' || 'Staging' }}
    if: needs.build.result == 'success' && github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: site-dist-${{ inputs.site }}
          path: ./deploy

      - name: Add staging robots.txt
        run: |
          echo "User-agent: *" > ./deploy/robots.txt
          echo "Disallow: /" >> ./deploy/robots.txt
          echo "✅ robots.txt added to deploy folder"

      - name: Create SSH Key
        run: |
          mkdir -p ~/.ssh
          touch ~/.ssh/id_ed25519_vps_ci 
          echo "${{ secrets.server_key }}" >> ~/.ssh/id_ed25519_vps_ci
          chmod 600 ~/.ssh/id_ed25519_vps_ci

      - name: Deploy site via SCP
        run: |
          scp -r -C -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_ed25519_vps_ci -P ${{ secrets.server_ssh_port }} \
          ./deploy/. ci@${{ secrets.server_host }}:/var/www/staging.${{ inputs.site }}

      - name: Verify website returns 200 (HTTPS) and 301 (HTTP)
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_ed25519_vps_ci \
              -p ${{ secrets.server_ssh_port }} \
              ci@${{ secrets.server_host }} << 'EOF'
            for i in {1..10}; do
              HTTPS_STATUS=$(curl -sSI --max-time 10 --connect-timeout 5 -o /dev/null -w "%{http_code}" https://staging.${{ inputs.site }} || echo "000")
              HTTP_STATUS=$(curl -sSI --max-time 10 --connect-timeout 5 -o /dev/null -w "%{http_code}" http://staging.${{ inputs.site }} || echo "000")

              if [ "$HTTPS_STATUS" -eq 200 ] && [ "$HTTP_STATUS" -eq 301 ]; then
                echo "✅ Website is up — HTTPS: $HTTPS_STATUS, HTTP: $HTTP_STATUS"
                exit 0
              fi

              echo "Attempt $i: HTTPS=$HTTPS_STATUS HTTP=$HTTP_STATUS — retrying in 10s..."
              sleep 10
            done

            echo "❌ Health check failed after 10 attempts"
            exit 1
          EOF

  deploy-live:
    runs-on: ubuntu-latest
    name: Deploy ${{ inputs.site }} To Live
    needs: deploy-staging
    environment: ${{ inputs.cms_deployment && 'Production_CMS' || 'Production' }}
    if: needs.deploy-staging.result == 'success' && github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: site-dist-${{ inputs.site }}
          path: ./deploy

      - name: Create SSH Key
        run: |
          mkdir -p ~/.ssh
          touch ~/.ssh/id_ed25519_vps_ci
          echo "${{ secrets.server_key }}" >> ~/.ssh/id_ed25519_vps_ci
          chmod 600 ~/.ssh/id_ed25519_vps_ci

      - name: Backup previous deployment
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_ed25519_vps_ci \
              -p ${{ secrets.server_ssh_port }} \
              ci@${{ secrets.server_host }} \
              "cp -r /var/www/${{ inputs.site }} /var/www/backup/${{ inputs.site }}-$(date +%F%H%M%S)"

      - name: Deploy site via SCP
        run: |
          scp -r -C -o StrictHostKeyChecking=no  \
          -i ~/.ssh/id_ed25519_vps_ci -P ${{ secrets.server_ssh_port }} \
          ./deploy/. ci@${{ secrets.server_host }}:/var/www/${{ inputs.site }}

      - name: Verify website returns 200 (HTTPS) and 301 (HTTP)
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_ed25519_vps_ci \
              -p ${{ secrets.server_ssh_port }} \
              ci@${{ secrets.server_host }} << 'EOF'
            for i in {1..10}; do
              HTTPS_STATUS=$(curl -sSI --max-time 10 --connect-timeout 5 -o /dev/null -w "%{http_code}" https://${{ inputs.site }} || echo "000")
              HTTP_STATUS=$(curl -sSI --max-time 10 --connect-timeout 5 -o /dev/null -w "%{http_code}" http://${{ inputs.site }} || echo "000")

              if [ "$HTTPS_STATUS" -eq 200 ] && [ "$HTTP_STATUS" -eq 301 ]; then
                echo "✅ Website is up — HTTPS: $HTTPS_STATUS, HTTP: $HTTP_STATUS"
                exit 0
              fi

              echo "Attempt $i: HTTPS=$HTTPS_STATUS HTTP=$HTTP_STATUS — retrying in 10s..."
              sleep 10
            done

            echo "❌ Health check failed after 10 attempts"
            exit 1
          EOF

      - name: Rollback to previous deployment if verification failed
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_ed25519_vps_ci \
              -p ${{ secrets.server_ssh_port }} \
              ci@${{ secrets.server_host }} << 'EOF'
            echo "🚨 Rolling back to previous deployment..."
            LATEST_BACKUP=$(ls -td /var/www/backup/${{ inputs.site }}-* 2>/dev/null | head -n 1)
            if [ -d "$LATEST_BACKUP" ]; then
              rsync -a --delete "$LATEST_BACKUP"/ /var/www/${{ inputs.site }}/
              echo "✅ Rollback complete: restored from $LATEST_BACKUP"
            else
              echo "⚠️ No backup found to restore from."
            fi
          EOF