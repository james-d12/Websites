permissions:
  contents: read

on:
  workflow_call:
    inputs:
      site:
        required: true
        type: string
      cms_deployment:
        required: false
        type: boolean
        default: false
      enable_cms:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ${{ inputs.site }}
    environment: 'Build'
    env:
      site_full_path: web/sites/${{ inputs.site }}
      PUBLIC_ENABLE_CMS: ${{ inputs.enable_cms }}
      DIRECTUS_URL: ${{ inputs.enable_cms && secrets.DIRECTUS_URL || '' }}
      DIRECTUS_BUILD_SECRET: ${{ inputs.enable_cms && secrets.DIRECTUS_BUILD_SECRET || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        name: Install pnpm
        id: pnpm-install
        with:
          version: 11
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9   # v6
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: web
        run: pnpm install

      - name: Check code formatting
        working-directory: web
        run: pnpm run format:check

      - name: Build Libs
        working-directory: web
        run: pnpm run build:libs

      - name: Build project
        working-directory: web
        run: pnpm --filter "${{ inputs.site }}" run build

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: site-dist-${{ inputs.site }}
          path: ${{ env.site_full_path }}/dist
          if-no-files-found: error
          retention-days: 30

  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy ${{ inputs.site }} To Staging
    needs: build
    environment: ${{ inputs.cms_deployment && 'Staging_CMS' || 'Staging' }}
    if: needs.build.result == 'success' && github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: site-dist-${{ inputs.site }}
          path: ./deploy

      - name: Add staging robots.txt
        run: |
          echo "User-agent: *" > ./deploy/robots.txt
          echo "Disallow: /" >> ./deploy/robots.txt
          echo "✅ robots.txt added to deploy folder"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          echo "${{ secrets.VPS_CI_KEY }}" > ~/.ssh/id_ed25519_vps_ci
          chmod 600 ~/.ssh/id_ed25519_vps_ci

          HOST_ENTRY="[${{ secrets.VPS_HOST }}]:${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST_PUBLIC_KEY }}"
          touch ~/.ssh/known_hosts
          grep -qxF "$HOST_ENTRY" ~/.ssh/known_hosts || \
          echo "$HOST_ENTRY" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Print Known Hosts
        run: cat ~/.ssh/known_hosts

      - name: Deploy site via rsync
        run: |
          rsync -avz \
            --omit-dir-times \
            --no-perms \
            --delete-delay \
            --delay-updates \
            --partial \
            --human-readable \
            -e "ssh \
              -o StrictHostKeyChecking=yes \
              -o ForwardAgent=no \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o PubkeyAcceptedAlgorithms=+ssh-ed25519 \
              -o HostkeyAlgorithms=+ssh-ed25519 \
              -i ~/.ssh/id_ed25519_vps_ci \
              -p ${{ secrets.VPS_PORT }}" \
            ./deploy/. \
            ci@${{ secrets.VPS_HOST }}:/var/www/staging.${{ inputs.site }}

      - name: Verify website returns 200 (HTTPS) and 301 (HTTP)
        run: |
          ssh -o StrictHostKeyChecking=yes -o ForwardAgent=no \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o PubkeyAcceptedAlgorithms=+ssh-ed25519 \
              -o HostkeyAlgorithms=+ssh-ed25519 \
              -i ~/.ssh/id_ed25519_vps_ci \
              -p ${{ secrets.VPS_PORT }} \
              ci@${{ secrets.VPS_HOST }} << 'EOF'
            for i in {1..10}; do
              HTTPS_STATUS=$(curl -sSI --max-time 10 --connect-timeout 5 -o /dev/null -w "%{http_code}" https://staging.${{ inputs.site }} || echo "000")
              HTTP_STATUS=$(curl -sSI --max-time 10 --connect-timeout 5 -o /dev/null -w "%{http_code}" http://staging.${{ inputs.site }} || echo "000")

              if [ "$HTTPS_STATUS" -eq 200 ] && [ "$HTTP_STATUS" -eq 301 ]; then
                echo "✅ Website is up — HTTPS: $HTTPS_STATUS, HTTP: $HTTP_STATUS"
                exit 0
              fi

              echo "Attempt $i: HTTPS=$HTTPS_STATUS HTTP=$HTTP_STATUS — retrying in 10s..."
              sleep 10
            done

            echo "❌ Health check failed after 10 attempts"
            exit 1
          EOF

  e2e-staging:
    runs-on: ubuntu-latest
    name: Test ${{ inputs.site }} Staging
    needs: deploy-staging
    if: needs.deploy-staging.result == 'success' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/e2e-test
        with:
          site: ${{ inputs.site }}
          base-url: https://staging.${{ inputs.site }}
          report-name: playwright-report-${{ inputs.site }}-staging

  deploy-live:
    runs-on: ubuntu-latest
    name: Deploy ${{ inputs.site }} To Live
    needs: [deploy-staging, e2e-staging]
    environment: ${{ inputs.cms_deployment && 'Production_CMS' || 'Production' }}
    if: needs.deploy-staging.result == 'success' && needs.e2e-staging.result == 'success' && github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: site-dist-${{ inputs.site }}
          path: ./deploy

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          echo "${{ secrets.VPS_CI_KEY }}" > ~/.ssh/id_ed25519_vps_ci
          chmod 600 ~/.ssh/id_ed25519_vps_ci

          HOST_ENTRY="[${{ secrets.VPS_HOST }}]:${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST_PUBLIC_KEY }}"
          touch ~/.ssh/known_hosts
          grep -qxF "$HOST_ENTRY" ~/.ssh/known_hosts || \
          echo "$HOST_ENTRY" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Backup previous deployment
        run: |
          ssh -o StrictHostKeyChecking=yes -o ForwardAgent=no \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o PubkeyAcceptedAlgorithms=+ssh-ed25519 \
              -o HostkeyAlgorithms=+ssh-ed25519 \
              -i ~/.ssh/id_ed25519_vps_ci \
              -p ${{ secrets.VPS_PORT }} \
              ci@${{ secrets.VPS_HOST }} \
              "cp -r /var/www/${{ inputs.site }} /var/www/backup/${{ inputs.site }}-$(date +%F%H%M%S)"

      - name: Deploy site via rsync
        run: |
          rsync -avz \
            --omit-dir-times \
            --no-perms \
            --delete-delay \
            --delay-updates \
            --partial \
            --human-readable \
            -e "ssh \
              -o StrictHostKeyChecking=yes \
              -o ForwardAgent=no \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o PubkeyAcceptedAlgorithms=+ssh-ed25519 \
              -o HostkeyAlgorithms=+ssh-ed25519 \
              -i ~/.ssh/id_ed25519_vps_ci \
              -p ${{ secrets.VPS_PORT }}" \
            ./deploy/. \
            ci@${{ secrets.VPS_HOST }}:/var/www/${{ inputs.site }}

      - name: Verify website returns 200 (HTTPS) and 301 (HTTP)
        run: |
          ssh -o StrictHostKeyChecking=yes -o ForwardAgent=no \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o PubkeyAcceptedAlgorithms=+ssh-ed25519 \
              -o HostkeyAlgorithms=+ssh-ed25519 \
              -i ~/.ssh/id_ed25519_vps_ci \
              -p ${{ secrets.VPS_PORT }} \
              ci@${{ secrets.VPS_HOST }} << 'EOF'
            for i in {1..10}; do
              HTTPS_STATUS=$(curl -sSI --max-time 10 --connect-timeout 5 -o /dev/null -w "%{http_code}" https://${{ inputs.site }} || echo "000")
              HTTP_STATUS=$(curl -sSI --max-time 10 --connect-timeout 5 -o /dev/null -w "%{http_code}" http://${{ inputs.site }} || echo "000")

              if [ "$HTTPS_STATUS" -eq 200 ] && [ "$HTTP_STATUS" -eq 301 ]; then
                echo "✅ Website is up — HTTPS: $HTTPS_STATUS, HTTP: $HTTP_STATUS"
                exit 0
              fi

              echo "Attempt $i: HTTPS=$HTTPS_STATUS HTTP=$HTTP_STATUS — retrying in 10s..."
              sleep 10
            done

            echo "❌ Health check failed after 10 attempts"
            exit 1 
          EOF

      - name: Rollback to previous deployment if verification failed
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=yes -o ForwardAgent=no \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o PubkeyAcceptedAlgorithms=+ssh-ed25519 \
              -o HostkeyAlgorithms=+ssh-ed25519 \
              -i ~/.ssh/id_ed25519_vps_ci \
              -p ${{ secrets.VPS_PORT }} \
              ci@${{ secrets.VPS_HOST }} << 'EOF'
            echo "🚨 Rolling back to previous deployment..."

            LATEST_BACKUP=$(find /var/www/backup -maxdepth 1 -type d -name "${{ inputs.site }}-*" -printf '%T@ %p\n' 2>/dev/null | sort -n | tail -n 1 | awk '{print $2}')

            if [ -z "$LATEST_BACKUP" ]; then
              echo "❌ No backup found for ${{ inputs.site }}. Cannot roll back."
              exit 1
            fi

            if [ ! -d "$LATEST_BACKUP" ]; then
              echo "❌ Backup path is not a valid directory: $LATEST_BACKUP"
              exit 1
            fi

            SOURCE="${LATEST_BACKUP%/}/"
            TARGET="/var/www/${{ inputs.site }}/"

            echo "Restoring from: $SOURCE → $TARGET"
            rsync -a --delete "$SOURCE" "$TARGET"
            echo "✅ Rollback complete: restored from $SOURCE"
          EOF
