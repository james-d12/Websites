name: Build & Deploy Black Cat Tattoos Website
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'web/sites/blackcattattoos.co.uk/**'
      - 'web/package.json'
      - 'web/pnpm-lock.yaml'
      - 'web/pnpm-workspace.yaml'
      - 'web/libs/**'
      - '.github/workflows/web-blackcattattoos.yml'
      - '.github/workflows/site-template.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  blackcattattoos:
    name: "Build & Deploy Black Cat Tattoos"
    uses: ./.github/workflows/site-template.yml
    with:
      site: blackcattattoos.co.uk
      enable_cms: true
    secrets: inherit