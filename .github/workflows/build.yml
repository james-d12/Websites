name: Build and Scan Web & Server
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build-web:
    runs-on: ubuntu-latest
    name: Build Web
    env:
      DIRECTUS_URL: "https://test.com"
      PUBLIC_ENABLE_CMS: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: web
        run: pnpm install

      - name: Check code formatting
        working-directory: web
        run: pnpm run format:check

      - name: Validate Renovate Config
        run: npx --yes --package renovate -- renovate-config-validator --strict

      - name: Run ESLint
        working-directory: web
        run: pnpm run lint

      - name: Run Audit
        working-directory: web
        run: pnpm audit --audit-level high --ignore-unfixable

      - name: Build All Projects
        working-directory: web
        run: pnpm build

      - name: Install Playwright Browsers
        working-directory: web
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        working-directory: web
        run: pnpm exec playwright test --reporter=list,html

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 3

  build-server:
    name: Build and Scan NixOS Server Config
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: DeterminateSystems/determinate-nix-action@1361e7900eb437fb341f0f226e8fbd9a0d8284fa # v3

      - name: Check Flake
        run: nix flake check
        working-directory: ./server/config

      - name: Build Server
        run: nix build .#nixosConfigurations.vps.config.system.build.toplevel --print-out-paths
        working-directory: ./server/config

      - name: Resolve build output path
        id: nix-result
        run: echo "path=$(readlink -f result)" >> $GITHUB_OUTPUT
        working-directory: ./server/config

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ${{ steps.nix-result.outputs.path }}
          artifact-name: syft-sbom
          format: spdx-json