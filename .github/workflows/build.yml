name: Build and Scan Web & Server
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build-web:
    runs-on: ubuntu-latest
    name: Build Web
    env:
      DIRECTUS_URL: "https://test.com"
      PUBLIC_ENABLE_CMS: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        name: Install pnpm
        id: pnpm-install
        with:
          version: 11
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: web
        run: pnpm install

      - name: Check code formatting
        working-directory: web
        run: pnpm run format:check

      - name: Validate Renovate Config
        run: npx --yes --package renovate -- renovate-config-validator --strict

      # Disable until fixed for TypeScript 7
      # - name: Run ESLint
      #  working-directory: web
      #  run: pnpm run lint

      - name: Run Audit
        working-directory: web
        run: pnpm audit --audit-level high --ignore-unfixable

      - name: Build All Projects
        working-directory: web
        run: pnpm build

      - name: Get installed Playwright version
        id: playwright-version
        working-directory: web
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: web
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright tests
        working-directory: web
        run: pnpm exec playwright test --reporter=list,html

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 3

  build-server:
    name: Build and Scan NixOS Server Config
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88 # v3

      - name: Check Flake
        run: nix flake check
        working-directory: ./server/config

      - name: Build Server
        run: nix build .#nixosConfigurations.vps.config.system.build.toplevel --print-out-paths
        working-directory: ./server/config

      - name: Resolve build output path
        id: nix-result
        run: echo "path=$(readlink -f result)" >> $GITHUB_OUTPUT
        working-directory: ./server/config

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ${{ steps.nix-result.outputs.path }}
          artifact-name: syft-sbom
          format: spdx-json