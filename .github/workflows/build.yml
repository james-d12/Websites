name: Build and Scan Web & Server
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build-web:
    runs-on: ubuntu-latest
    name: Build Web
    env:
      DIRECTUS_URL: ${{ secrets.DIRECTUS_URL }}
      PUBLIC_ENABLE_CMS: false
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: web
        run: pnpm install

      - name: Check code formatting
        working-directory: web
        run: pnpm run format:check

      - name: Run ESLint
        working-directory: web
        run: pnpm run lint

      - name: Run Audit
        working-directory: web
        run: pnpm audit --audit-level high --ignore-unfixable

      - name: Build All Projects
        working-directory: web
        run: pnpm build

      - name: Install Playwright Browsers
        working-directory: web
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        working-directory: web
        run: pnpm exec playwright test --reporter=list

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 3

  build-server:
    name: Build and Scan NixOS Server Config
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - uses: DeterminateSystems/determinate-nix-action@89ab342bd48ff7318caf8d39d6a330c7b1df8f2f # v3

      - name: Check Flake
        run: nix flake check
        working-directory: ./server/config

      - name: Build Server
        run: nix build .#nixosConfigurations.vps.config.system.build.toplevel --print-out-paths
        working-directory: ./server/config

      - name: Resolve build output path
        id: nix-result
        run: echo "path=$(readlink -f result)" >> $GITHUB_OUTPUT
        working-directory: ./server/config

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ${{ steps.nix-result.outputs.path }}
          artifact-name: syft-sbom
          format: spdx-json